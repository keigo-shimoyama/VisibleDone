<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visible Done — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main>
    <header>
      <h1>Visible Done</h1>
      <p class="tagline">Completed tasks as accumulated evidence of work done.</p>
    </header>

    <div class="save-banner" id="saveBanner" aria-live="polite"></div>

    <!-- Master toggle -->
    <section class="card">
      <label class="row-label">
        <span class="label-text">Enable Visible Done</span>
        <input type="checkbox" id="enabled" class="toggle" />
      </label>
    </section>

    <!-- Display -->
    <section class="card" id="sectionDisplay">
      <h2>Display</h2>

      <label class="row-label">
        <span class="label-text">Keep completed tasks visible</span>
        <input type="checkbox" id="permanentListMode" class="toggle" />
      </label>

      <label class="row-label">
        <span class="label-text">Task order</span>
        <select id="displayMode">
          <option value="default">Default (Google's order)</option>
          <option value="newest_done_first">Newest completed first</option>
          <option value="timeline" id="optTimeline">Timeline (requires timestamping)</option>
        </select>
      </label>
    </section>

    <!-- Appearance -->
    <section class="card" id="sectionAppearance">
      <h2>Appearance</h2>

      <label class="row-label">
        <span class="label-text">Remove strikethrough</span>
        <input type="checkbox" id="removeStrikethrough" class="toggle" />
      </label>

      <div class="field">
        <span class="label-text">Accent color</span>
        <div class="color-row">
          <button class="color-swatch" data-color="#10B981" style="background:#10B981" title="Emerald"></button>
          <button class="color-swatch" data-color="#D97706" style="background:#D97706" title="Gold"></button>
          <button class="color-swatch" data-color="#0284C7" style="background:#0284C7" title="Sky"></button>
          <button class="color-swatch" data-color="#64748B" style="background:#64748B" title="Slate"></button>
          <input type="color" id="achievementColor" title="Custom color" />
        </div>
      </div>

      <div class="field">
        <label class="label-text" for="doneOpacity">
          Opacity: <span id="opacityValue">88%</span>
        </label>
        <input type="range" id="doneOpacity" min="0.3" max="1" step="0.01" />
      </div>
    </section>

    <!-- Counter -->
    <section class="card" id="sectionCounter">
      <h2>Daily Counter</h2>

      <label class="row-label">
        <span class="label-text">Show counter</span>
        <input type="checkbox" id="showCounter" class="toggle" />
      </label>

      <div id="counterOptions">
        <label class="row-label">
          <span class="label-text">Label style</span>
          <select id="counterLabel">
            <option value="stacked_today">Stacked Today</option>
            <option value="done_today">Done Today</option>
            <option value="completed_today">Completed Today</option>
          </select>
        </label>

        <div class="field">
          <label class="label-text" for="dailyTarget">Daily goal (optional)</label>
          <input type="number" id="dailyTarget" min="1" max="999" placeholder="e.g. 10" />
        </div>
      </div>
    </section>

    <!-- Timestamping -->
    <section class="card" id="sectionTimestamping">
      <h2>Timestamping</h2>
      <p class="warning">
        ⚠️ Timestamping appends <code>[Done: 14:30]</code> to your task titles.
        This modifies your Google Tasks data. Use with caution.
      </p>

      <label class="row-label">
        <span class="label-text">Enable timestamping</span>
        <input type="checkbox" id="timestamping" class="toggle" />
      </label>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
